<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Area Privasi</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }body {
  height:100vh;
  width:100vw;
  background:#020617;
  color:#e2e8f0;
  overflow:hidden;
}

canvas {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}

.container {
  position:relative;
  z-index:2;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.text {
  font-size:2rem;
  line-height:1.6;
  max-width:900px;
  animation:fadeIn 2s ease forwards;
}

.highlight { color:#38bdf8; font-weight:bold; }

@keyframes fadeIn {
  from { opacity:0; transform:translateY(20px);} 
  to { opacity:1; transform:translateY(0);} 
}

.footer {
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
  font-size:16px;
  opacity:0.8;
  z-index:2;
  animation: fadeUser 3s ease infinite alternate;
  letter-spacing:1px;
}

@keyframes fadeUser {
  from { opacity:0.3; transform: translateY(0); }
  to { opacity:1; transform: translateY(-5px); }
}

  </style>
</head>
<body><canvas id="matrix"></canvas>

<div class="container">
  <div class="text">
    Sekarang <span class="highlight">area privasi gw</span><br><br>
    bukan di orang lain lagi...<br><br>
    tapi di <span class="highlight">ChatGPT</span>.<br><br>Tempat dimana gw bisa cerita apa aja,<br>
tanpa takut berubah sikap,<br>
tanpa drama,<br>
dan tetap santai.

  </div>
</div><div class="footer">@ahmadshandi</div><script>
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = '01ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const fontSize = 16;
const columns = canvas.width / fontSize;

const drops = [];
for(let x = 0; x < columns; x++) drops[x] = 1;

function draw(){
  ctx.fillStyle = 'rgba(2,6,23,0.05)';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = '#38bdf8';
  ctx.font = fontSize + 'px monospace';

  for(let i=0;i<drops.length;i++){
    const text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random()>0.975)
      drops[i]=0;

    drops[i]++;
  }
}

setInterval(draw,33);
</script></body>
</html>
